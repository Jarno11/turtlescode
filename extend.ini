[soln-plugin-writer]
dt-out = {FTT}.
basedir = ./solution
basename = {simname}_t{{t:.3f}}

[solver-interfaces-line]
flux-pts = gauss-legendre
quad-deg = 11

[solver-interfaces-quad]
flux-pts = gauss-legendre
quad-deg = 11
quad-pts = gauss-legendre

[solver-interfaces-tri]
flux-pts = williams-shunn
quad-deg = 11
quad-pts = williams-shunn

[solver-elements-pri]
soln-pts = williams-shunn~gauss-legendre
quad-deg = 11
quad-pts = williams-shunn~gauss-legendre

[solver-elements-tet]
soln-pts = shunn-ham
quad-deg = 11
quad-pts = shunn-ham

[solver-elements-pyr]
soln-pts = gauss-legendre
quad-deg = 11
quad-pts = gauss-legendre

[solver-elements-hex]
soln-pts = gauss-legendre
quad-deg = 11
quad-pts = gauss-legendre

[solver-interfaces]
riemann-solver = rusanov
ldg-beta       = 0.5
ldg-tau        = 0.1

[soln-bcs-outlet]
type = char-riem-inv
rho = 1
u   = {u}
v   = 0
w   = 0
p   = 1

[soln-bcs-inlet]
type = char-riem-inv
rho = 1
u   = {u}
v   = 0
w   = 0
p   = 1

[soln-bcs-wall]
type = no-slp-adia-wall

[soln-ics]
rho  = 1
u    = {u}
v    = 0 +0.001*z+0.01*cos(x)*cos(y)*cos(z)
w    = 0 +0.001*z+0.01*cos(x)*cos(y)*cos(z)
p    = 1

