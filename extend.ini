[backend]
precision = double

[constants]
gamma = 1.4
mu    = {mu}
Pr    = 0.72
M     = 0.2

[solver]
system = navier-stokes
order  = 4
anti-alias = flux, surf-flux

[solver-time-integrator]
scheme = rk45
controller = pi
atol = 1e-5
rtol= 1e-5
t0 = {transient_restart}.0
dt = 1e-7
tend = {fiveFTT}.0

[soln-plugin-nancheck]
nsteps = 1000

[soln-plugin-fluidforce-wall]
nsteps = 250
file = ./solution/cylinder-forces.csv
header = true
quad-deg = 6

